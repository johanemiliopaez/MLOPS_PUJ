apiVersion: v1
kind: ConfigMap
metadata:
  name: mlops-config
data:
  # Comunicación mediante DNS interno de Kubernetes
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
  DATA_API_URL: "http://data-api:80/data"
  API_URL: "http://fastapi:8000"
  AWS_DEFAULT_REGION: "us-east-1"
  MINIO_BUCKET: "mlflow-artifacts"
  GROUP_NUMBER: "1"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- 1. Crear base de datos para Airflow y dar permisos
    CREATE DATABASE airflow_db;
    GRANT ALL PRIVILEGES ON DATABASE airflow_db TO mlops_user;
    
    -- 2. Conectarse a la base de datos de MLOps (mlops_db se crea por la variable POSTGRES_DB)
    \c mlops_db;
    
    -- 3. Crear las tablas de la aplicación requeridas por el DAG mlops_pipeline.py
    
    CREATE TABLE IF NOT EXISTS raw_data (
        id SERIAL PRIMARY KEY,
        batch_id VARCHAR(255) NOT NULL,
        data JSONB, -- Opcional, dependiendo de si insertas el lote entero
        record_data JSONB NOT NULL, -- Columna principal usada en _store_raw_batch
        status VARCHAR(50),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );


    CREATE TABLE IF NOT EXISTS clean_data (
        id SERIAL PRIMARY KEY,
        raw_id INTEGER REFERENCES raw_data(id),
        features JSONB NOT NULL,
        price FLOAT, -- Añadido para _train_candidate_model
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS pipeline_history (
        id SERIAL PRIMARY KEY,
        batch_id VARCHAR(100),
        execution_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        status VARCHAR(50),
        reason TEXT,
        candidate_mae FLOAT,
        champion_mae FLOAT
    );

    CREATE TABLE IF NOT EXISTS inference_logs (
        id SERIAL PRIMARY KEY,
        request_id VARCHAR(100) NOT NULL,
        inference_timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        input_data JSONB NOT NULL,
        prediction FLOAT,
        model_name VARCHAR(200),
        model_version VARCHAR(200),
        response_time_ms FLOAT,
        status VARCHAR(50),
        error_message TEXT
    );
    
    -- 4. Dar permisos sobre estas tablas y secuencias al usuario mlops_user
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO mlops_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO mlops_user;
---
apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
type: Opaque
stringData:
  POSTGRES_USER: "mlops_user"
  POSTGRES_PASSWORD: "mlops_password"
  MINIO_ROOT_USER: "minio_admin"
  MINIO_ROOT_PASSWORD: "minio_password"
  AWS_ACCESS_KEY_ID: "minio_admin"
  AWS_SECRET_ACCESS_KEY: "minio_password"
  DB_URI: "postgresql+psycopg2://mlops_user:mlops_password@postgres:5432/mlops_db"
  MLFLOW_DB_URI: "postgresql://mlops_user:mlops_password@postgres:5432/mlops_db"
  AIRFLOW_DB_URI: "postgresql+psycopg2://mlops_user:mlops_password@postgres:5432/airflow_db"