apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports: [{ containerPort: 9090 }]
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
        - name: prom-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: prom-config
        configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports: [{ containerPort: 3000 }]
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        envFrom:
        - secretRef: { name: mlops-secrets }
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
          subPath: datasources.yaml
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
          subPath: dashboards.yaml
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards/realestate_dashboard.json
          subPath: realestate_dashboard.json
      volumes:
      - name: grafana-provisioning
        configMap: { name: grafana-provisioning }
      - name: grafana-dashboards
        configMap: { name: grafana-dashboard-realestate }
---
apiVersion: v1
kind: Service
metadata: { name: grafana }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: locust }
spec:
  replicas: 1
  selector: { matchLabels: { app: locust } }
  template:
    metadata: { labels: { app: locust } }
    spec:
      containers:
      - name: locust
        image: locustio/locust:2.24.1
        command: ["locust", "-f", "/mnt/locust/locustfile.py", "--host", "http://fastapi:8000"]
        ports: [{ containerPort: 8089 }]
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          httpGet:
            path: /
            port: 8089
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8089
          initialDelaySeconds: 20
          periodSeconds: 20
        volumeMounts:
        - name: locust-scripts
          mountPath: /mnt/locust
      volumes:
      - name: locust-scripts
        configMap: { name: locust-config }
---
apiVersion: v1
kind: Service
metadata: { name: locust }
spec:
  selector: { app: locust }
  ports: [{ port: 8089 }]