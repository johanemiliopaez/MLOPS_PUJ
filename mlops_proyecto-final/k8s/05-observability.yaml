apiVersion: v1
kind: ConfigMap
metadata: { name: prometheus-config }
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'fastapi'
        static_configs:
          - targets: ['fastapi:8000']
---
apiVersion: v1
kind: ConfigMap
metadata: { name: locust-config }
data:
  locustfile.py: |
    from locust import HttpUser, task, between
    import random

    class RealEstatePredictorUser(HttpUser):
        wait_time = between(1, 2)

        @task(5)
        def predict_readmission(self):
            payload = {
                "bed": random.randint(1, 6),
                "bath": random.choice([1, 1.5, 2, 2.5, 3]),
                "acre_lot": round(random.uniform(0.05, 1.5), 2),
                "house_size": random.randint(600, 4200),
                "status": random.choice(["ready for sale", "ready to build"]),
                "city": random.choice(["Bogotá", "Tunja", "Sogamoso", "Pereira", "Medellín", "Cali"]),
                "state": random.choice(["Cundinamarca", "Boyacá", "Risaralda", "Antioquia", "Valle del Cauca"])
            }
            with self.client.post("/predict", json=payload, catch_response=True) as response:
                if response.status_code == 200:
                    response.success()
                else:
                    response.failure(f"Falló la predicción: {response.text}")

        @task(1)
        def health_check(self):
            self.client.get("/health")
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports: [{ containerPort: 9090 }]
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "300m", memory: "512Mi" }
        volumeMounts:
        - name: prom-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: prom-config
        configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports: [{ containerPort: 3000 }]
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "300m", memory: "512Mi" }
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
---
apiVersion: v1
kind: Service
metadata: { name: grafana }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: locust }
spec:
  replicas: 1
  selector: { matchLabels: { app: locust } }
  template:
    metadata: { labels: { app: locust } }
    spec:
      containers:
      - name: locust
        image: locustio/locust:2.24.1
        command: ["locust", "-f", "/mnt/locust/locustfile.py", "--host", "http://fastapi:8000"]
        ports: [{ containerPort: 8089 }]
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "300m", memory: "512Mi" }
        volumeMounts:
        - name: locust-scripts
          mountPath: /mnt/locust
      volumes:
      - name: locust-scripts
        configMap: { name: locust-config }
---
apiVersion: v1
kind: Service
metadata: { name: locust }
spec:
  selector: { app: locust }
  ports: [{ port: 8089 }]