name: inference-api-ci-cd

on:
  push:
    branches:
      - main

    paths:
      - 'mlops_proyecto2/api/**'
      - 'mlops_proyecto2/k8s/**'

permissions:
  contents: write

jobs:

  build-test-push:

    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:

    # =========================
    # 1. Descargar repo
    # =========================

    - name: Checkout repository
      uses: actions/checkout@v3

    # =========================
    # 2. Instalar Python
    # =========================

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # =========================
    # 3. Instalar dependencias
    # =========================

    - name: Install dependencies
      run: |
        pip install -r mlops_proyecto2/api/

    # =========================
    # 4. Ejecutar tests
    # =========================

    #- name: Run tests
    #  run: |
    #    pytest services/inference-api/tests

    # =========================
    # 5. Login DockerHub
    # =========================

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # 6. Build Docker image
    # =========================

    - name: Build Docker image
      run: |
        docker build \
          -t massimomg/mlops-api:${{ github.sha }} \
          mlops_proyecto2/api

    # =========================
    # 7. Push Docker image
    # =========================

    - name: Push Docker image
      run: |
        docker push massimomg/mlops-api:${{ github.sha }}

    # =========================
    # 8. Actualizar deployment
    # =========================

    - name: Update Kubernetes deployment
      run: |

        sed -i \
        "/image: massimomg\/mlops-api:/c\        image: massimomg/mlops-api:${{ github.sha }}" \
        mlops_proyecto2/k8s/04-apps.yaml

    # =========================
    # 9. Commit cambios
    # =========================

    - name: Commit updated manifest

      run: |

        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git add infrastructure/k8s/inference-api/deployment.yaml

        git commit -m \
        "Update inference-api image to ${{ github.sha }} [skip ci]"

        git push
