---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-diabetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      # InitContainer para crear el bucket en MinIO antes de arrancar MLflow
      initContainers:
      - name: create-bucket
        image: minio/mc
        command:
        - /bin/sh
        - -c
        - |
          echo "Esperando 10 segundos a que MinIO esté completamente listo..."
          sleep 10
          mc alias set myminio http://minio:9000 $(AWS_ACCESS_KEY_ID) $(AWS_SECRET_ACCESS_KEY)
          mc mb myminio/mlflow-artifacts --ignore-existing
          mc anonymous set public myminio/mlflow-artifacts
          echo "Bucket configurado exitosamente."
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minio_admin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minio_password"
      
      containers:
      - name: mlflow
        image: puenayan1/mlops-mlflow:v2
        command:
          - "mlflow"
          - "server"
          - "--host=0.0.0.0"
          - "--port=5000"
          - "--backend-store-uri=postgresql://mlops_user:mlops_password@postgres:5432/mlops_db"
          - "--default-artifact-root=s3://mlflow-artifacts"
          - "--workers=1"
          # Esta línea soluciona el error 'Invalid Host header' permitiendo el tráfico interno de K8s
          - "--allowed-hosts=mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minio_admin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minio_password"
        # Los límites de recursos se mantienen comentados según tu preferencia actual
        # resources:
        #   requests:
        #     memory: "512Mi"
        #     cpu: "200m"
        #   limits:
        #     memory: "1Gi"
        #     cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-diabetes
spec:
  type: LoadBalancer
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000