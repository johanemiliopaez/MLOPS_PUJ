---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops-diabetes
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'fastapi'
        static_configs:
          - targets: ['fastapi:8000']
---
# 🚀 NUEVO: Configuración de auto-conexión para Grafana
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-config
  namespace: mlops-diabetes
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: PostgreSQLMLOps
        type: postgres
        access: proxy
        url: postgres:5432
        user: mlops_user
        secureJsonData:
          password: mlops_password
        jsonData:
          database: mlops_db       # <-- ¡El cambio clave está aquí!
          sslmode: 'disable'
          postgresVersion: 1500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops-diabetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops-diabetes
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops-diabetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        # 🚀 NUEVO: Inyectando el archivo de aprovisionamiento
        volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: grafana-datasources
        configMap:
          name: grafana-datasources-config
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlops-diabetes
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
  type: LoadBalancer