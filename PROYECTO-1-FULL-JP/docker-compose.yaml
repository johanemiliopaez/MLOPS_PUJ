networks:
  data_network:
    driver: bridge
  ml_network:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  jupyter_data:

services:
  # === BLOQUE 1: API DE DATOS (Red Aislada) ===
  api_datos:
    build: ./data_api
    container_name: fastapi_datos
    ports:
      - "8080:80"
    volumes:
      - ./data_api/data:/data
    networks:
      - data_network

  # === BLOQUE 2: AIRFLOW (El Puente ETL) ===
  airflow:
    build: ./airflow
    container_name: airflow_etl
    command: standalone
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _AIRFLOW_DB_MIGRATE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - data_network
      - ml_network
    depends_on:
      - api_datos
      - mysql
      - minio

  # === BLOQUE 3: MYSQL ===
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ml_data
      MYSQL_USER: ml_user
      MYSQL_PASSWORD: ml_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ml_network

  # === BLOQUE 4: MINIO ===
  minio:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ml_network

  # === BLOQUE 5: JUPYTERLAB ===
  jupyterlab:
    build: ./jupyter
    container_name: jupyter_lab
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "jupyter"
    volumes:
      - jupyter_data:/home/jovyan/work
    networks:
      - ml_network
    depends_on:
      - mysql
      - minio

  # === BLOQUE 6: API INFERENCIA ===
  api_inferencia:
    build: ./inference_api
    container_name: fastapi_inferencia
    ports:
      - "8000:8000"
    networks:
      - ml_network
    depends_on:
      - minio
    restart: always