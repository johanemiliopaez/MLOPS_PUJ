# Docker Compose: Airflow + MinIO + PostgreSQL + FastAPI
#
# CREDENCIALES ADMINISTRADOR (cambiar en producción):
# --------------------------------------------------
# PostgreSQL:
#   Usuario: airflow
#   Clave:   airflow
#   DB:      airflow
#
# MinIO (consola web):
#   Usuario: minioadmin
#   Clave:   minioadmin
#
# Airflow (UI web):
#   Usuario: airflow
#   Clave:   airflow
#
# Jupyter (Lab/Notebook):
#   Token:   jupyter (o el valor de JUPYTER_TOKEN)
#
# FastAPI: sin autenticación (API pública)
# --------------------------------------------------

services:
  postgres:
    image: postgres:13
    container_name: data-p2-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: data-p2-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: data-p2-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/models --ignore-existing;
      exit 0;
      "
    restart: "no"

  airflow-init:
    image: apache/airflow:2.6.0
    container_name: data-p2-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    user: "50000:0"
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow version
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.6.0
    container_name: data-p2-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8080:8080"
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    user: "50000:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.6.0
    container_name: data-p2-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    user: "50000:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  api-model:
    build:
      context: ../API-Model
      dockerfile: Docker/Dockerfile
    image: api-model:latest
    pull_policy: never
    container_name: api-model
    ports:
      - "8989:80"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: models
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: jupyter.Dockerfile
    image: data-p2-jupyter:latest
    pull_policy: never
    container_name: data-p2-jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: jupyter
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: models
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ../Data P2:/home/jovyan/work
    restart: unless-stopped

volumes:
  postgres-db-volume:
  minio-data:
  airflow-dags:
  airflow-logs:
  airflow-plugins:
