# Variables de entorno: usar .env o .env.example como referencia.
# docker compose lee .env automáticamente si existe.

networks:
  data_network:
    driver: bridge
  ml_network:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  jupyter_data:

services:
  # === BLOQUE 1: API DE DATOS (Red Aislada) ===
  api_datos:
    build: ./data_api
    container_name: fastapi_datos
    ports:
      - "8080:80"
    volumes:
      - ./data_api/data:/data
    networks:
      - data_network

  # === BLOQUE 2: AIRFLOW (El Puente ETL) ===
  airflow:
    build: ./airflow
    container_name: airflow_etl
    command: standalone
    ports:
      - "8081:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _AIRFLOW_DB_MIGRATE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USERNAME:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-ml_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ml_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ml_data}
      - MINIO_HOST=${MINIO_HOST:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-password123}
      - MINIO_BUCKET_ARTEFACTOS=${MINIO_BUCKET_ARTEFACTOS:-artefactos}
      - API_DATOS_URL=${API_DATOS_URL:-http://api_datos:80}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - data_network
      - ml_network
    depends_on:
      - api_datos
      - mysql
      - minio

  # === BLOQUE 3: MYSQL ===
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "3306:3306"
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ml_data}
      MYSQL_USER: ${MYSQL_USER:-ml_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ml_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ml_network

  # === BLOQUE 4: MINIO ===
  minio:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ml_network

  # === BLOQUE 5: JUPYTERLAB ===
  jupyterlab:
    build: ./jupyter
    container_name: jupyter_lab
    ports:
      - "8888:8888"
    env_file:
      - path: .env
        required: false
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-jupyter}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-ml_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ml_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ml_data}
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET_MODELOS: ${MINIO_BUCKET_MODELOS:-modelos}
    volumes:
      - jupyter_data:/home/jovyan/work
    networks:
      - ml_network
    depends_on:
      - mysql
      - minio

  # === BLOQUE 6: API INFERENCIA ===
  api_inferencia:
    build: ./inference_api
    container_name: fastapi_inferencia
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET_MODELOS: ${MINIO_BUCKET_MODELOS:-modelos}
      MINIO_BUCKET_ARTEFACTOS: ${MINIO_BUCKET_ARTEFACTOS:-artefactos}
    networks:
      - ml_network
    depends_on:
      - minio
    restart: always