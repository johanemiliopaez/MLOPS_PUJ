apiVersion: v1
kind: Service
metadata:
  name: streamlit
  namespace: mlops-proyecto2
spec:
  selector:
    app: streamlit
  ports:
    - port: 8501
      targetPort: 8501
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: mlops-proyecto2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: docker.io/innovacion/proyecto2-streamlit:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: proyecto2-config
          ports:
            - containerPort: 8501
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
