apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlops-proyecto2
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: mlops-proyecto2
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: proyecto2
        orgId: 1
        folder: Proyecto2
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-proyecto2
  namespace: mlops-proyecto2
data:
  proyecto2-api-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "refresh": "5s",
      "time": {"from": "now-15m", "to": "now"},
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(api_requests_total)", "refId": "A"}],
          "title": "Solicitudes totales",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(api_requests_total{status=\"success\"})", "refId": "A"}],
          "title": "Predicciones exitosas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "targets": [{"expr": "sum(api_requests_total{status=\"error\"})", "refId": "A"}],
          "title": "Errores totales",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "targets": [{"expr": "sum(rate(api_requests_total{status=\"error\"}[1m])) / clamp_min(sum(rate(api_requests_total[1m])), 0.001)", "refId": "A"}],
          "title": "Tasa de error (1m)",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "id": 5,
          "targets": [
            {"expr": "sum by (status) (rate(api_requests_total{endpoint=\"/predict\"}[1m]))", "refId": "A", "legendFormat": "{{status}}"}
          ],
          "title": "Requests por segundo /predict (por status)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "id": 6,
          "targets": [
            {"expr": "sum(rate(api_request_latency_seconds_sum{endpoint=\"/predict\"}[1m])) / clamp_min(sum(rate(api_request_latency_seconds_count{endpoint=\"/predict\"}[1m])), 0.001)", "refId": "A", "legendFormat": "promedio"}
          ],
          "title": "Latencia promedio /predict",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 13},
          "id": 7,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(api_request_latency_seconds_bucket{endpoint=\"/predict\"}[5m])) by (le))", "refId": "A", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(api_request_latency_seconds_bucket{endpoint=\"/predict\"}[5m])) by (le))", "refId": "B", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(api_request_latency_seconds_bucket{endpoint=\"/predict\"}[5m])) by (le))", "refId": "C", "legendFormat": "p99"}
          ],
          "title": "Latencia /predict (p50/p95/p99)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 21},
          "id": 8,
          "targets": [
            {"expr": "rate(process_cpu_seconds_total{job=\"api\"}[1m])", "refId": "A", "legendFormat": "CPU (cores)"}
          ],
          "title": "CPU del pod API (cores)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "decbytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 21},
          "id": 9,
          "targets": [
            {"expr": "process_resident_memory_bytes{job=\"api\"}", "refId": "A", "legendFormat": "RSS"}
          ],
          "title": "Memoria del pod API (RSS)",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["proyecto2", "mlops"],
      "templating": {"list": []},
      "title": "Proyecto 2 API Dashboard",
      "version": 2
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlops-proyecto2
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops-proyecto2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.2
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/proyecto2-api-dashboard.json
              subPath: proyecto2-api-dashboard.json
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-proyecto2
