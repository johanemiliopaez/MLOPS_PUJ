apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-proyecto2
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-proyecto2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: docker.io/innovacion/proyecto2-mlflow:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - >
              mlflow server
              --host 0.0.0.0
              --port 5000
              --backend-store-uri postgresql+psycopg2://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$MLFLOW_DB
              --artifacts-destination s3://$MINIO_BUCKET
              --serve-artifacts
          envFrom:
            - configMapRef:
                name: proyecto2-config
            - secretRef:
                name: proyecto2-secrets
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
