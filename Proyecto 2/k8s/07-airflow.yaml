apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: mlops-proyecto2
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: mlops-proyecto2
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: airflow-init
          image: docker.io/innovacion/proyecto2-airflow:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: proyecto2-config
            - secretRef:
                name: proyecto2-secrets
          command:
            - /bin/bash
            - -c
            - |
              until bash -c '</dev/tcp/postgres/5432'; do
                echo "waiting for postgres";
                sleep 5;
              done
              airflow db migrate &&
              airflow users create \
                --username "$AIRFLOW_ADMIN_USERNAME" \
                --password "$AIRFLOW_ADMIN_PASSWORD" \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@example.com
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: mlops-proyecto2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: docker.io/innovacion/proyecto2-airflow:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: proyecto2-config
            - secretRef:
                name: proyecto2-secrets
          env:
            - name: PROJECT_SRC
              value: /opt/airflow/project/training/src
          command:
            - /bin/bash
            - -c
            - |
              until bash -c '</dev/tcp/postgres/5432'; do
                echo "waiting for postgres";
                sleep 5;
              done
              airflow webserver
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: mlops-proyecto2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: airflow-scheduler
          image: docker.io/innovacion/proyecto2-airflow:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: proyecto2-config
            - secretRef:
                name: proyecto2-secrets
          env:
            - name: PROJECT_SRC
              value: /opt/airflow/project/training/src
          command:
            - /bin/bash
            - -c
            - |
              until bash -c '</dev/tcp/postgres/5432'; do
                echo "waiting for postgres";
                sleep 5;
              done
              airflow scheduler
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
