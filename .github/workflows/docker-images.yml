name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "mlops_proyecto-final/airflow_image/**"
      - "mlops_proyecto-final/mlflow_image/**"
      - "mlops_proyecto-final/api/**"
      - "mlops_proyecto-final/ui/**"
      - "mlops_proyecto-final/dags/**"
      - ".github/workflows/docker-images.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: airflow
            context: mlops_proyecto-final
            dockerfile: mlops_proyecto-final/airflow_image/Dockerfile
            image: mlops-realestate-airflow
          - name: mlflow
            context: mlops_proyecto-final/mlflow_image
            dockerfile: mlops_proyecto-final/mlflow_image/Dockerfile
            image: mlops-realestate-mlflow
          - name: api
            context: mlops_proyecto-final/api
            dockerfile: mlops_proyecto-final/api/Dockerfile
            image: mlops-realestate-api
          - name: ui
            context: mlops_proyecto-final/ui
            dockerfile: mlops_proyecto-final/ui/Dockerfile
            image: mlops-realestate-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
